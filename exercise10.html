<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습문제 10번</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <formn>
        <fieldset style="width: 300px;">
            <table>
                <tr>
                    <td><b>시작 그룹</b></td>
                </tr>
                <tr>
                    <td>
                        <input id="New" type="radio" name="Window" value="N">
                        <label for="New">새 탭 페이지 열기</label><br>
                        <input id="Break" type="radio" name="Window" value="B">
                        <label for="Break">중단한 위치에서 계속하기</label><br>
                        <input id="Specific" type="radio" name="Window" value="S">
                        <label for="Specific">특정 페이지 또는 페이지 모음 열기</label><br>
                    </td>
                </tr>

                <!--문단 나누기-->
                <td><br></td>

                <tr>
                    <td><b>개인정보 및 보안</b></td>
                </tr>
                <tr>
                    <td>
                        <input id="Synchron" type="checkbox" name="Per" value="S">
                        <label for="Synchron">동기화 및 서비스</label><br>
                        <input id="Login" type="checkbox" name="Per" value="L">
                        <label for="Login">로그인 허용</label><br>
                        <input id="Page" type="checkbox" name="Per" value="P">
                        <label for="Page">페이지 미리 로드</label><br>
                    </td>
                </tr>
            </table>
        </fieldset>
    </formn>
</body>
</html>
