<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom 실습1</title>
</head>
<body>
    <h1 id = "title">처음 제목</h1>
    <button id="changebutton">제목 바꾸기</button>

    <script>
        var h1 = document.getElementById("title")
        var btn = document.getElementById("changebutton")
        btn.onclick = function() {
            h1.textContent = "글자 변경";
        }
    </script>
</body>
</html>
