    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9_18</title>
    <script>
        let num = parseInt(prompt("입력해주세요"));
        let th = parseInt(num / 1000);
        let hd = parseInt(num % 1000 / 100);
        let ten = parseInt(num % 100 / 10);
        let one = parseInt(num % 10);

        alert("천의 자리: " + th + ", 백의 자리: " + hd + ", 십의 자리: " + ten + ", 일의 자리: " + one);
    </script>
